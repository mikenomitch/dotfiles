# ~/.config/starship.toml  —  minimal, fast, one file across all machines & shells
# Full reference: https://starship.rs/config/

# Keep the prompt on a single line, with a clean character.
add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch$git_status\
$nodejs$python$rust$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = ""
style = "bold purple"

[git_status]
style = "yellow"

[cmd_duration]
min_time = 2000
format = "[ $duration]($style) "
style = "dimmed white"

# Language versions only show up inside relevant projects, and stay quiet otherwise.
# Plain-text symbols (no Nerd Font glyphs).
[nodejs]
format = "[ $symbol($version )]($style)"
symbol = "node "
style = "green"
detect_files = ["package.json", ".nvmrc"]

[python]
format = "[ $symbol($version )]($style)"
symbol = "py "
style = "yellow"

[rust]
format = "[ $symbol($version )]($style)"
symbol = "rs "

[golang]
format = "[ $symbol($version )]($style)"
symbol = "go "
